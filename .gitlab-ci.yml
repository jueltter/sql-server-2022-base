workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^\d{4}-\d{4}-\d{2}-(DEV|PROD)$/'
    - when: never

stages:
  - build

variables:
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"
  DOCKER_DIND_OPTIONS: "--insecure-registry=$REGISTRY_DOMAIN --insecure-registry=$MAIN_DOMAIN"
  IMAGE_NAME: "$REGISTRY_DOMAIN/development/infrastructure/sql-server-2022-base/sql-server-2022-base"


build_and_push:
  stage: build
  image: docker:29.6.0-cli
  services:
    - name: docker:29.6.0-dind
  tags:
    - shared
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$REGISTRY_DOMAIN"
  script:
    - export MSSQL_PASSWORD="$CONTAINER_USER_PASSWORD"
    - docker build --secret id=mssql_password,env=MSSQL_PASSWORD -t "$IMAGE_NAME:$CI_COMMIT_TAG" .
    - docker push $IMAGE_NAME:$CI_COMMIT_TAG