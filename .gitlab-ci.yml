workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^((\d{4}-(DEV|PROD))|latest)$/'
    - when: never

stages:
  - build

variables:
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""
  IMAGE_NAME: "$REGISTRY_DOMAIN/development/infrastructure/sql-server-base/sql-server-base"


build_and_push:
  stage: build
  image: docker:29.6.0-cli
  services:
    - name: docker:29.6.0-dind
  tags:
    - shared
  before_script:
    - apk add --no-cache ca-certificates
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - export MSSQL_PASSWORD="$CONTAINER_USER_PASSWORD"
    - SQL_SERVER_IMAGE_TAG=$(cat ./args/sql_server_image_tag.txt)
    - docker build --provenance=false --platform linux/amd64 --build-arg SQL_SERVER_IMAGE_TAG=$SQL_SERVER_IMAGE_TAG --secret id=mssql_password,env=MSSQL_PASSWORD -t "$IMAGE_NAME:$CI_COMMIT_TAG" .
    - docker push $IMAGE_NAME:$CI_COMMIT_TAG