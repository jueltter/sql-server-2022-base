workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^\d{4}-\d{4}-\d{2}-(DEV|PROD)$/'
    - when: never

stages:
  - build

variables:
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"
  IMAGE_NAME: "$REGISTRY_DOMAIN/development/infrastructure/sql-server-2022-base/sql-server-2022-base"


build_and_push:
  stage: build
  image: docker:29.6.0-cli
  services:
    - name: docker:29.6.0-dind
  tags:
    - shared
  before_script:
    # install ca-certificates and add internal CA certificate
    - apk add --no-cache ca-certificates
    - cp "$INTERNAL_CA_CERT" /usr/local/share/ca-certificates/internal-ca.crt
    - update-ca-certificates
    # configure docker to trust the internal registry
    - mkdir -p /etc/docker/certs.d/registry-gitlab-dtic.finanzas.gob.ec/
    - cp "$INTERNAL_CA_CERT" /etc/docker/certs.d/registry-gitlab-dtic.finanzas.gob.ec/ca.crt
    # login to the internal registry
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - export MSSQL_PASSWORD="$CONTAINER_USER_PASSWORD"
    - docker build --secret id=mssql_password,env=MSSQL_PASSWORD -t "$IMAGE_NAME:$CI_COMMIT_TAG" .
    - docker push $IMAGE_NAME:$CI_COMMIT_TAG